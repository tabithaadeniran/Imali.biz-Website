<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --sidebar-w: 240px;
        }
        /* SIDEBAR — natural flex child on the left, scrolls independently */
  .sidebar { width: var(--sidebar-w); flex-shrink: 0; height: 100%; overflow-y: auto; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-nav { padding: 1.5rem 0; flex: 1; }
  .sidebar-section-label { font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); padding: 0 1.25rem; margin: 0.75rem 0 0.5rem; }
  .sidebar-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.65rem 1.25rem; cursor: none; transition: background 0.2s, color 0.2s; text-decoration: none; color: var(--text-dim); font-size: 0.82rem; position: relative; border-radius: 0; }
  .sidebar-item:hover { background: var(--surface); color: var(--text); }
  .sidebar-item.active { background: rgba(200,82,26,0.1); color: var(--terracotta); }
  .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--terracotta); border-radius: 0 2px 2px 0; }
  .sidebar-icon { font-size: 1rem; flex-shrink: 0; width: 20px; text-align: center; }
  .sidebar-badge { margin-left: auto; background: var(--terracotta); color: white; font-size: 0.6rem; font-weight: 700; border-radius: 1rem; padding: 0.15rem 0.45rem; }
  .sidebar-badge.gold { background: var(--gold); color: var(--ink); }
  .sidebar-footer { padding: 1.25rem; border-top: 1px solid var(--border); }
  .sidebar-back { display: flex; align-items: center; gap: 0.5rem; color: var(--text-faint); font-size: 0.75rem; text-decoration: none; cursor: none; transition: color 0.2s; }
  .sidebar-back:hover { color: var(--text-dim); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .tab-panel { padding: 1.5rem; }
    .topnav { padding: 0 1.25rem; }
    .trust-hero { flex-direction: column; gap: 1.5rem; }
    .trust-breakdown { grid-template-columns: 1fr; }
  }
    </style>
</head>
<body>
     <!-- SIDEBAR -->
  <div class="sidebar">
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="#" class="sidebar-item active" data-tab="overview">
        <span class="sidebar-icon">📊</span> Overview
      </a>
      <a href="#" class="sidebar-item" data-tab="listings">
        <span class="sidebar-icon">🏡</span> My Listings
        <span class="sidebar-badge">4</span>
      </a>
      <a href="#" class="sidebar-item" data-tab="inquiries">
        <span class="sidebar-icon">💬</span> Inquiries
        <span class="sidebar-badge">3</span>
      </a>
      <a href="#" class="sidebar-item" data-tab="valhistory">
        <span class="sidebar-icon">⚡</span> Valuation History
      </a>
      <div class="sidebar-section-label">Profile</div>
      <a href="#" class="sidebar-item" data-tab="trust">
        <span class="sidebar-icon">🛡️</span> Trust Score
      </a>
      <div class="sidebar-section-label">Ecosystem</div>
      <a href="#" class="sidebar-item" data-tab="partner" id="partnerLink">
        <span class="sidebar-icon">🌱</span> Partner Dashboard
        <span class="sidebar-badge gold">New</span>
      </a>
      <a href="#" class="sidebar-item" data-tab="settings">
        <span class="sidebar-icon">⚙️</span> Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" class="sidebar-back">← Back to Land Bank</a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
</body>
</html>
